apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-ranking
  labels:
    app: ecommerce-ranking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-ranking
  template:
    metadata:
      labels:
        app: ecommerce-ranking
    spec:
      containers:
      - name: ecommerce-ranking
        image: YOUR_ECR_REPO/ecommerce-ranking:latest
        ports:
        - containerPort: 80
        env:
        - name: ConnectionStrings__Redis
          value: "redis-service:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-ranking-service
spec:
  type: LoadBalancer
  selector:
    app: ecommerce-ranking
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
